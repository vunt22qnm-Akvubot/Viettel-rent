<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Viettel Asset - Cho thuê văn phòng toàn quốc</title>
    <meta name="google-site-verification" content="wgrPg6fQx6wx0V_AvHU7nwXZQ6WMhOB_WN95HszLnk" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <style>
        :root { --vt-red: #e60000; --vt-teal: #008080; }
        .bg-vt-red { background-color: var(--vt-red); }
        .text-vt-red { color: var(--vt-red); }
        .text-vt-teal { color: var(--vt-teal); }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        
        .hero-title-3d {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .thumb-img { aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .thumb-img:hover { opacity: 0.8; transform: scale(0.95); }
        
        /* Tối ưu Mobile */
        @media (max-width: 768px) {
            .hero-title-3d { font-size: 1.6rem; }
            .section-hero { padding: 3rem 1rem 5rem 1rem; }
            .search-container { margin-top: -3.5rem; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-white shadow-md sticky-header border-b-4 border-vt-red">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Viettel_logo_2021.svg/1200px-Viettel_logo_2021.svg.png" alt="Viettel" class="h-8 md:h-10">
                <h1 class="text-lg md:text-xl font-bold text-vt-red uppercase leading-tight">Viettel Asset</h1>
            </div>
            <div class="text-right">
                <p class="text-vt-red font-black text-sm md:text-lg">0985.990.994</p>
            </div>
        </div>
    </header>

    <section class="section-hero bg-vt-teal py-20 text-center relative overflow-hidden shadow-inner">
        <div class="relative z-10 max-w-5xl mx-auto px-4">
            <h2 class="hero-title-3d">HỆ THỐNG TÒA NHÀ <br> VIETTEL TOÀN QUỐC</h2>
            <div class="mt-4 inline-block bg-black/30 backdrop-blur-md border border-yellow-400 px-6 py-2 rounded-full">
                <p class="text-yellow-400 font-bold text-sm uppercase">🏠 Giải pháp văn phòng chuyên nghiệp</p>
            </div>
        </div>
    </section>

    <div class="container mx-auto px-4 search-container relative z-20">
        <div class="bg-white p-4 rounded-2xl shadow-2xl flex flex-col md:flex-row gap-3 border border-gray-100">
            <input type="text" id="search" onkeyup="filterData()" placeholder="Tìm theo tỉnh thành hoặc tên tòa nhà..." class="flex-1 border-2 border-gray-100 p-3 rounded-xl focus:border-vt-teal outline-none text-sm">
            <select id="region" onchange="filterData()" class="border-2 border-gray-100 p-3 rounded-xl outline-none font-bold text-gray-600 bg-gray-50 text-sm">
                <option value="all">Tất cả khu vực</option>
                <option value="Trung">Miền Trung</option>
                <option value="Bac">Miền Bắc</option>
                <option value="Nam">Miền Nam</option>
            </select>
        </div>
    </div>

    <main class="container mx-auto px-4 py-10">
        <div id="building-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script>
        const buildings = [
            { 
                tinh: "Quảng Nam", 
                ten: "Tòa nhà Viettel Quảng Nam", 
                diaChi: "Số 121 Hùng Vương, Tam Kỳ, Quảng Nam",
                trong: "345m2 - Tầng 5",
                tienIch: ["PCCC chuẩn", "An ninh 24/7", "Bãi xe rộng", "Máy phát dự phòng"],
                nv: "Nguyễn Văn Ninh",
                sdt: "0984636158",
                region: "Trung",
                hinhAnh: [
                    "https://i.ibb.co/wrJbn2gW/z7723237916358-ef7a71b395e8a0263febc0df1f3aaa57.jpg",
                    "https://i.ibb.co/43BLcXK/z7723237924683-925909363d4bf927686a6a40456158d5.jpg"
                ]
            },
            { 
                tinh: "Đà Nẵng", 
                ten: "Viettel TechHub Đà Nẵng", 
                diaChi: "Lô A1-1, Đường 2/9, Hải Châu, Đà Nẵng",
                trong: "Hết diện tích", 
                tienIch: ["Văn phòng hạng A", "View sông Hàn", "Smart Building", "Trung tâm TP"],
                nv: "Đinh Viết Thủy",
                sdt: "0376945999",
                region: "Trung",
                hinhAnh: ["https://i.ibb.co/jP8tM7V2/6890869106090432170.jpg"] 
            },
            { 
                tinh: "Thừa Thiên Huế", 
                ten: "Tòa nhà Viettel Huế", 
                diaChi: "Số 11 Lý Thường Kiệt, TP Huế",
                trong: "50m2 - 200m2",
                tienIch: ["Trung tâm TP", "An ninh nghiêm ngặt", "Hạ tầng Viễn thông", "Sảnh lễ tân"],
                nv: "Trương Khắc Mai",
                sdt: "0982008777",
                region: "Trung",
                hinhAnh: [
                    "https://i.ibb.co/8LMS51TJ/z7724359573420-621d833c15d0a8e3a96f18a5ac683afa.jpg",
                    "https://i.ibb.co/SD2WD1yp/z7724359587344-72145b4b0b5414e573cd8e7fbf16b9c8.jpg"
                ]
            },
            { 
                tinh: "Gia Lai", 
                ten: "Tòa nhà Viettel Gia Lai", 
                diaChi: "Số 89 Nguyễn Tất Thành, Pleiku, Gia Lai",
                trong: "50m2 - 200m2",
                tienIch: ["Trục đường chính", "PCCC tiêu chuẩn", "Điện nước ổn định", "Khu dân cư đông"],
                nv: "Hoàng Kim Bốn",
                sdt: "0969313578",
                region: "Trung",
                hinhAnh: ["https://i.imgur.com/4hKsq1U.jpg"]
            }
        ];

        function renderBuildings(data) {
            const grid = document.getElementById('building-grid');
            grid.innerHTML = data.map((b, index) => {
                const isFull = b.trong.toLowerCase().includes("hết");
                const galleryId = `gallery-${index}`;

                // Tạo danh sách tiện ích
                const tags = b.tienIch.map(t => `<span class="bg-gray-100 text-gray-600 text-[10px] px-2 py-1 rounded font-bold"># ${t}</span>`).join('');

                // Tạo khối ảnh nhỏ (thumbnails)
                const thumbs = b.hinhAnh.length > 1 ? `
                    <div class="grid grid-cols-4 gap-2 mt-2 px-5">
                        ${b.hinhAnh.map(img => `
                            <a href="${img}" data-fancybox="${galleryId}">
                                <img src="${img}" class="thumb-img border border-gray-200">
                            </a>
                        `).join('')}
                    </div>
                ` : '';

                return `
                    <div class="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col border border-gray-100">
                        <div class="relative h-56 overflow-hidden">
                             <span class="absolute top-4 left-4 ${isFull ? 'bg-gray-500' : 'bg-vt-red'} text-white text-[10px] px-3 py-1 rounded-full font-black z-10 uppercase">
                                ${isFull ? 'Đã đầy' : b.tinh}
                             </span>
                             <a href="${b.hinhAnh[0]}" data-fancybox="${galleryId}">
                                <img src="${b.hinhAnh[0]}" class="w-full h-full object-cover transition-transform hover:scale-105 duration-500">
                             </a>
                        </div>

                        ${thumbs}

                        <div class="p-6 flex-1 flex flex-col">
                            <h3 class="text-xl font-black text-gray-800 mb-2 leading-tight">${b.ten}</h3>
                            <p class="text-xs text-gray-500 mb-4 italic"><i class="fa-solid fa-map-pin text-vt-red"></i> ${b.diaChi}</p>
                            
                            <div class="mb-4 bg-teal-50 p-4 rounded-2xl border border-teal-100">
                                <p class="text-[9px] text-vt-teal font-black uppercase mb-1">Diện tích trống:</p>
                                <p class="font-black text-gray-900 text-lg">${b.trong}</p>
                            </div>

                            <div class="mb-5">
                                <p class="text-[9px] text-gray-400 font-black uppercase mb-2">Tiện ích nổi bật:</p>
                                <div class="flex flex-wrap gap-1.5">
                                    ${tags}
                                </div>
                            </div>

                            <div class="bg-gray-50 p-4 rounded-2xl mb-6 flex items-center gap-4">
                                <div class="bg-vt-red text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                                    <i class="fa-solid fa-headset"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-black text-gray-800">${b.nv}</p>
                                    <p class="text-xs font-black text-vt-red">${b.sdt}</p>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3 mt-auto">
                                <a href="${isFull ? '#' : 'tel:' + b.sdt}" class="${isFull ? 'bg-gray-300 pointer-events-none' : 'bg-vt-red'} text-white text-center py-3.5 rounded-xl font-black text-sm flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-phone-flip"></i> GỌI NGAY
                                </a>
                                <a href="https://zalo.me/${b.sdt}" target="_blank" class="bg-blue-600 text-white text-center py-3.5 rounded-xl font-black text-sm flex items-center justify-center gap-2">
                                    ZALO
                                </a>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function filterData() {
            const search = document.getElementById('search').value.toLowerCase();
            const region = document.getElementById('region').value;
            const filtered = buildings.filter(b => {
                const matchName = b.tinh.toLowerCase().includes(search) || b.ten.toLowerCase().includes(search);
                const matchRegion = region === 'all' || b.region === region;
                return matchName && matchRegion;
            });
            renderBuildings(filtered);
        }

        window.onload = () => renderBuildings(buildings);
        Fancybox.bind("[data-fancybox]", {});
    </script>
</body>
</html>
