<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel Asset - Cho thuê văn phòng toàn quốc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <style>
        :root { --vt-red: #e60000; --vt-teal: #008080; }
        .bg-vt-red { background-color: var(--vt-red); }
        .text-vt-red { color: var(--vt-red); }
        .text-vt-teal { color: var(--vt-teal); }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .thumb-link { transition: all 0.2s; border: 2px solid transparent; }
        .thumb-link:hover { opacity: 0.8; border-color: var(--vt-teal); }

        .fancybox__content img { max-width: 100% !important; max-height: 90vh !important; object-fit: contain; }

        /* SỬA ĐỔI TẠI ĐÂY: Chỉ làm mờ phần nội dung, KHÔNG làm mờ hình ảnh */
        .building-full .info-content { 
            opacity: 0.5; /* Làm mờ phần chữ */
        }
        .building-full .main-img-container, 
        .building-full .thumbnails-container { 
            opacity: 1 !important; 
            filter: none !important; 
        }
        .badge-full { background-color: #6b7280; }

        .contact-person {
            background: linear-gradient(to right, #f9fafb, #ffffff);
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-white shadow-md sticky-header border-b-4 border-vt-red">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Viettel_logo_2021.svg/1200px-Viettel_logo_2021.svg.png" alt="Viettel" class="h-10">
                <div>
                    <h1 class="text-xl font-bold text-vt-red uppercase leading-tight">Viettel Asset Management</h1>
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-semibold">Quản lý tài sản & Cho thuê văn phòng</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-10">
        <div id="building-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script>
        Fancybox.bind("[data-fancybox]", {
            Images: { Panzoom: { maxScale: 3 } }
        });

        const buildings = [
            { 
                tinh: "Quảng Nam", 
                ten: "Tòa nhà Viettel Quảng Nam", 
                diaChi: "Số 121 Hùng Vương, Tam Kỳ, Quảng Nam",
                trong: "345m2 - Tầng 5",
                tienIch: "PCCC chuẩn, An ninh 24/7, Bãi đỗ xe rộng",
                nv: "Nguyễn Văn Ninh",
                sdt: "0984636158",
                region: "Trung",
                hinhAnh: [
                    "https://i.ibb.co/wrJbn2gW/z7723237916358-ef7a71b395e8a0263febc0df1f3aaa57.jpg",
                    "https://i.ibb.co/43BLcXK/z7723237924683-925909363d4bf927686a6a40456158d5.jpg"
                ]
            },
            { 
                tinh: "Đà Nẵng", 
                ten: "Viettel Complex Đà Nẵng", 
                diaChi: "Nguyễn Văn Linh, Đà Nẵng",
                trong: "Hết diện tích", 
                tienIch: "View sông Hàn, Điều hòa trung tâm, Thang máy tốc độ cao",
                nv: "Đinh Viết Thủy",
                sdt: "0376945999",
                region: "Trung",
                hinhAnh: ["https://i.ibb.co/wrJbn2gW/z7723237916358-ef7a71b395e8a0263febc0df1f3aaa57.jpg"] 
            }
        ];

        function renderBuildings(data) {
            const grid = document.getElementById('building-grid');
            grid.innerHTML = data.map((b, index) => {
                const mainImg = (b.hinhAnh && b.hinhAnh.length > 0) ? b.hinhAnh[0] : 'https://via.placeholder.com/400x300';
                const galleryId = `gallery-${index}`;
                const isFull = b.trong.toLowerCase().includes("hết");
                const statusClass = isFull ? "badge-full" : "bg-vt-red";

                let thumbnailsHtml = '';
                if (b.hinhAnh && b.hinhAnh.length > 1) {
                    thumbnailsHtml = `<div class="thumbnails-container grid grid-cols-4 gap-2 mt-3 px-6 pb-2">`;
                    for (let i = 1; i < b.hinhAnh.length; i++) {
                        thumbnailsHtml += `
                            <a href="${b.hinhAnh[i]}" data-fancybox="${galleryId}" class="thumb-link block h-16 rounded overflow-hidden">
                                <img src="${b.hinhAnh[i]}" class="w-full h-full object-cover">
                            </a>`;
                    }
                    thumbnailsHtml += `</div>`;
                }

                return `
                    <div class="bg-white rounded-2xl shadow-md border overflow-hidden card-hover flex flex-col ${isFull ? 'building-full' : ''}">
                        <div class="main-img-container bg-gray-200 h-64 flex items-center justify-center relative group">
                             <span class="absolute top-4 left-4 ${statusClass} text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase z-10 shadow-lg">
                                ${isFull ? 'Đã cho thuê' : b.tinh}
                             </span>
                             <a href="${mainImg}" data-fancybox="${galleryId}" class="block w-full h-full">
                                <img src="${mainImg}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                                    <i class="fa-solid fa-expand text-3xl text-white"></i>
                                </div>
                             </a>
                        </div>

                        ${thumbnailsHtml}

                        <div class="info-content p-6 pt-4 flex-1 flex flex-col">
                            <h3 class="text-xl font-bold mb-1 text-gray-800">${b.ten}</h3>
                            <p class="text-sm text-gray-500 mb-4 flex items-start gap-1">
                                <i class="fa-solid fa-location-dot text-vt-red mt-1"></i> ${b.diaChi}
                            </p>
                            
                            <div class="mb-4 bg-gray-50 p-3 rounded-lg border-l-4 ${isFull ? 'border-gray-400' : 'border-vt-teal'}">
                                <p class="text-[10px] font-bold uppercase tracking-wider">Diện tích trống:</p>
                                <p class="font-bold text-gray-700">${b.trong}</p>
                            </div>

                            <div class="text-sm mb-4">
                                <p class="font-semibold text-gray-600 mb-1">Tiện ích:</p>
                                <p class="text-gray-500 line-clamp-2 italic">${b.tienIch}</p>
                            </div>

                            <div class="contact-person p-3 rounded-xl mb-5 flex items-center gap-3">
                                <div class="bg-vt-teal/10 w-11 h-11 rounded-full flex items-center justify-center text-vt-teal">
                                    <i class="fa-solid fa-user-tie"></i>
                                </div>
                                <div>
                                    <p class="text-[10px] text-gray-400 uppercase font-bold">Phụ trách</p>
                                    <p class="font-bold text-gray-800">${b.nv}</p>
                                    <p class="text-sm font-bold text-vt-red">${b.sdt}</p>
                                </div>
                            </div>

                            <div class="border-t pt-4 mt-auto">
                                <div class="grid grid-cols-2 gap-3">
                                    <a href="${isFull ? '#' : 'tel:' + b.sdt}" class="${isFull ? 'bg-gray-400 cursor-not-allowed' : 'bg-vt-red hover:bg-red-700'} text-white text-center py-2.5 rounded-lg font-bold flex items-center justify-center gap-2">
                                        <i class="fa-solid fa-phone-volume ${isFull ? '' : 'animate-pulse'}"></i> ${isFull ? 'Hết chỗ' : 'Gọi ngay'}
                                    </a>
                                    <a href="https://zalo.me/${b.sdt}" target="_blank" class="bg-blue-600 text-white text-center py-2.5 rounded-lg font-bold flex items-center justify-center gap-2">
                                        Zalo
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        window.onload = () => renderBuildings(buildings);
    </script>
</body>
</html>
