<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel Asset - Cho thuê văn phòng toàn quốc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />
<meta name="google-site-verification" content="wgrPg6fQx6wx0V_AvHU7nwXZQ6GWMhOB_WN95HszLnk" />
    <style>
        :root { --vt-red: #e60000; --vt-teal: #008080; }
        .bg-vt-red { background-color: var(--vt-red); }
        .text-vt-red { color: var(--vt-red); }
        .text-vt-teal { color: var(--vt-teal); }
        .border-vt-red { border-color: var(--vt-red); }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        .hero-title-3d {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            letter-spacing: -1px;
            filter: drop-shadow(0 1px 0 #ccc)
                    drop-shadow(0 2px 0 #c9c9c9)
                    drop-shadow(0 3px 0 #bbb)
                    drop-shadow(0 4px 0 #b9b9b9)
                    drop-shadow(0 15px 15px rgba(0,0,0,0.5));
        }

        .hero-subtitle-glass {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 35px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            border: 2px solid #ffd700;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .text-gold {
            color: #ffd700;
            font-weight: 800;
            font-size: 1.3rem;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .building-full .info-content { opacity: 0.7; filter: grayscale(0.3); }
        .badge-full { background-color: #6b7280; }
        .contact-person { background: linear-gradient(to right, #f9fafb, #ffffff); border: 1px dashed #cbd5e1; }
        
        @media (max-width: 768px) {
            .hero-title-3d { font-size: 2.2rem; }
            .text-gold { font-size: 1rem; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-white shadow-md sticky-header border-b-4 border-vt-red">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Viettel_logo_2021.svg/1200px-Viettel_logo_2021.svg.png" alt="Viettel" class="h-10">
                <div>
                    <h1 class="text-xl font-bold text-vt-red uppercase leading-tight">Viettel Asset Management</h1>
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-semibold">Quản lý tài sản & Cho thuê văn phòng</p>
                </div>
            </div>
            <div class="hidden lg:block text-right text-sm font-medium">
                <p><i class="fa-solid fa-map-marker-alt text-vt-red"></i> Hệ thống phủ rộng 63 tỉnh thành</p>
                <p><i class="fa-solid fa-phone text-vt-red"></i> Hotline: 0985.990.994</p>
            </div>
        </div>
    </header>

    <section class="bg-vt-teal py-24 px-4 text-center relative overflow-hidden shadow-[inset_0_-10px_20px_rgba(0,0,0,0.2)]">
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <i class="fa-solid fa-building text-[300px] absolute -bottom-10 -left-20 rotate-12"></i>
            <i class="fa-solid fa-signal text-[250px] absolute -top-10 -right-20 -rotate-12"></i>
        </div>
        <div class="relative z-10 max-w-5xl mx-auto">
            <h2 class="hero-title-3d">HỆ THỐNG TÒA NHÀ <br class="hidden md:block"> VIETTEL TOÀN QUỐC</h2>
            <div class="hero-subtitle-glass">
                <p class="text-gold"><i class="fa-solid fa-award mr-2"></i>Giải pháp văn phòng chuyên nghiệp cho mọi doanh nghiệp</p>
            </div>
        </div>
    </section>

    <div class="container mx-auto px-4 -mt-10">
        <div class="bg-white p-7 rounded-2xl shadow-2xl flex flex-wrap gap-5 items-center border border-gray-100">
            <div class="flex-1 min-w-[300px] relative">
                <i class="fa-solid fa-search absolute left-4 top-4 text-vt-teal text-lg"></i>
                <input type="text" id="search" onkeyup="filterData()" placeholder="Bạn đang tìm văn phòng tại tỉnh thành nào?" class="w-full border-2 border-gray-100 p-4 pl-12 rounded-xl focus:border-vt-teal outline-none transition-all text-gray-700 font-medium">
            </div>
            <select id="region" onchange="filterData()" class="border-2 border-gray-100 p-4 rounded-xl outline-none cursor-pointer font-bold text-gray-600 bg-gray-50">
                <option value="all">Tất cả khu vực</option>
                <option value="Bac">Miền Bắc</option>
                <option value="Trung">Miền Trung</option>
                <option value="Nam">Miền Nam</option>
            </select>
            <div class="text-sm font-black text-white px-6 py-4 bg-vt-red rounded-xl shadow-lg">
                <span id="count">0</span> TÒA NHÀ SẴN SÀNG
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-14">
        <div id="building-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <footer class="bg-gray-900 text-white py-14">
        <div class="container mx-auto px-4 text-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Viettel_logo_2021.svg/1200px-Viettel_logo_2021.svg.png" alt="Viettel" class="h-10 mx-auto mb-8 brightness-0 invert">
            <p class="mb-4 font-light text-gray-400">© 2026 Viettel Asset Management</p>
            <div class="flex justify-center gap-6">
                <a href="#" class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center hover:bg-red-600 transition-all text-xl"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="tel:0985990994" class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center hover:bg-green-600 transition-all text-xl"><i class="fa-solid fa-phone"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script>
        const buildings = [
            { 
                tinh: "Quảng Nam", 
                ten: "Tòa nhà Viettel Quảng Nam", 
                diaChi: "Số 121 Hùng Vương, Tam Kỳ, Quảng Nam",
                trong: "345m2 - Tầng 5",
                tienIch: "PCCC tiêu chuẩn quốc tế, An ninh 24/7, Bãi đỗ xe rộng rãi.",
                nv: "Nguyễn Văn Ninh",
                sdt: "0984636158",
                region: "Trung",
                hinhAnh: [
                    "https://i.ibb.co/wrJbn2gW/z7723237916358-ef7a71b395e8a0263febc0df1f3aaa57.jpg",
                    "https://i.ibb.co/43BLcXK/z7723237924683-925909363d4bf927686a6a40456158d5.jpg"
                ]
            },
            { 
                tinh: "Đà Nẵng", 
                ten: "Viettel TechHub Đà Nẵng", 
                diaChi: "Lô A1-1, Đường 2/9, Hải Châu, Đà Nẵng",
                trong: "Hết diện tích", 
                tienIch: "Văn phòng hạng A, View sông Hàn, đạt tiêu chuẩn quốc tế.",
                nv: "Đinh Viết Thủy",
                sdt: "0376945999",
                region: "Trung",
                hinhAnh: ["https://i.ibb.co/jP8tM7V2/6890869106090432170.jpg"] 
            },
            { 
                tinh: "Thừa Thiên Huế", 
                ten: "Tòa nhà Viettel Huế", 
                diaChi: "Số 11 Lý Thường Kiệt, TP Huế",
                trong: "50m2 - 200m2",
                tienIch: "Vị trí đắc địa trung tâm TP Huế, an ninh nghiêm ngặt.",
                nv: "Trương Khắc Mai",
                sdt: "0982008777",
                region: "Trung",
                hinhAnh: [
                    "https://i.ibb.co/8LMS51TJ/z7724359573420-621d833c15d0a8e3a96f18a5ac683afa.jpg",
                    "https://i.ibb.co/SD2WD1yp/z7724359587344-72145b4b0b5414e573cd8e7fbf16b9c8.jpg"
                ]
            },
            { 
                tinh: "Gia Lai", 
                ten: "Tòa nhà Viettel Gia Lai", 
                diaChi: "Số 89 Nguyễn Tất Thành, Pleiku, Gia Lai",
                trong: "50m2 - 200m2",
                tienIch: "Trung tâm TP Pleiku, hạ tầng viễn thông hiện đại.",
                nv: "Hoàng Kim Bốn",
                sdt: "0969313578",
                region: "Trung",
                hinhAnh: ["https://i.imgur.com/4hKsq1U.jpg"]
            }
        ];

        function renderBuildings(data) {
            const grid = document.getElementById('building-grid');
            document.getElementById('count').innerText = data.length;
            grid.innerHTML = data.map((b, index) => {
                const mainImg = (b.hinhAnh && b.hinhAnh.length > 0) ? b.hinhAnh[0] : 'https://via.placeholder.com/600x400?text=Viettel+Asset';
                const galleryId = `gallery-${index}`;
                const isFull = b.trong.toLowerCase().includes("hết");

                return `
                    <div class="bg-white rounded-3xl shadow-xl border-b-8 ${isFull ? 'border-gray-300 building-full' : 'border-vt-teal'} overflow-hidden card-hover flex flex-col">
                        <div class="relative h-64 overflow-hidden group">
                             <span class="absolute top-5 left-5 ${isFull ? 'badge-full' : 'bg-vt-red'} text-white text-[11px] px-4 py-2 rounded-xl font-black uppercase z-10 shadow-xl">
                                ${isFull ? 'Đã cho thuê' : b.tinh}
                             </span>
                             <a href="${mainImg}" data-fancybox="${galleryId}">
                                <img src="${mainImg}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/600x400?text=Viettel+Asset'">
                             </a>
                             ${b.hinhAnh.slice(1).map(img => `<a href="${img}" data-fancybox="${galleryId}" class="hidden"></a>`).join('')}
                        </div>
                        <div class="p-8 flex-1 flex flex-col">
                            <h3 class="text-2xl font-black mb-3 text-gray-800">${b.ten}</h3>
                            <p class="text-sm text-gray-500 mb-5 flex items-start gap-2 italic">
                                <i class="fa-solid fa-map-location-dot text-vt-red text-lg"></i> ${b.diaChi}
                            </p>
                            <div class="mb-6 bg-teal-50/50 p-5 rounded-2xl border-2 border-teal-100">
                                <p class="text-[10px] text-vt-teal font-black uppercase mb-2">Diện tích trống:</p>
                                <p class="font-black text-gray-800 text-xl">${b.trong}</p>
                            </div>
                            <div class="contact-person p-4 rounded-2xl mb-8 flex items-center gap-4 shadow-sm">
                                <div class="bg-vt-red w-12 h-12 rounded-full flex items-center justify-center text-white"><i class="fa-solid fa-headset text-xl"></i></div>
                                <div>
                                    <p class="text-[10px] text-gray-400 uppercase font-black">Tư vấn viên</p>
                                    <p class="font-black text-gray-800">${b.nv}</p>
                                    <p class="text-sm font-black text-vt-red">${b.sdt}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mt-auto">
                                <a href="${isFull ? '#' : 'tel:' + b.sdt}" class="${isFull ? 'bg-gray-400' : 'bg-vt-red hover:bg-red-700'} text-white text-center py-4 rounded-2xl font-black flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-phone-flip"></i> ${isFull ? 'Hết chỗ' : 'Gọi Ngay'}
                                </a>
                                <a href="https://zalo.me/${b.sdt}" target="_blank" class="bg-blue-600 text-white text-center py-4 rounded-2xl font-black flex items-center justify-center gap-2">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/1200px-Icon_of_Zalo.svg.png" class="h-6 w-6"> Zalo
                                </a>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function filterData() {
            const search = document.getElementById('search').value.toLowerCase();
            const region = document.getElementById('region').value;
            const filtered = buildings.filter(b => {
                const matchName = b.tinh.toLowerCase().includes(search) || b.ten.toLowerCase().includes(search);
                const matchRegion = region === 'all' || b.region === region;
                return matchName && matchRegion;
            });
            renderBuildings(filtered);
        }

        window.onload = () => renderBuildings(buildings);
        Fancybox.bind("[data-fancybox]", {});
    </script>
</body>
</html>
