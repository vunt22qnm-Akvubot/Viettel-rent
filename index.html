<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel Asset - Cho thuê văn phòng toàn quốc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <style>
        :root { --vt-red: #e60000; --vt-teal: #008080; }
        .bg-vt-red { background-color: var(--vt-red); }
        .text-vt-red { color: var(--vt-red); }
        .text-vt-teal { color: var(--vt-teal); }
        .border-vt-red { border-color: var(--vt-red); }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .thumb-link { transition: all 0.2s; border: 2px solid transparent; }
        .thumb-link:hover { opacity: 0.8; border-color: var(--vt-teal); }

        /* HIỆU ỨNG TIÊU ĐỀ NỔI BẬT MỚI */
        .hero-title {
            font-size: 3rem; /* Tăng cỡ chữ */
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: -1px;
            line-height: 1.2;
            /* Hiệu ứng đổ bóng nhiều lớp tạo độ nổi khối 3D */
            text-shadow: 0 1px 0 #ccc, 
                         0 2px 0 #c9c9c9, 
                         0 3px 0 #bbb, 
                         0 4px 0 #b9b9b9, 
                         0 10px 20px rgba(0,0,0,0.4);
        }

        .hero-subtitle-box {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.15); /* Nền kính mờ */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .hero-subtitle-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Các style cũ của bạn */
        .building-full .info-content { opacity: 0.6; filter: grayscale(0.2); }
        .building-full .main-img-link, .building-full .thumbnails-container { opacity: 1 !important; filter: none !important; pointer-events: auto !important; }
        .badge-full { background-color: #6b7280; }
        .contact-person { background: linear-gradient(to right, #f9fafb, #ffffff); border: 1px dashed #cbd5e1; }
        .phone-number { letter-spacing: 0.5px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-white shadow-md sticky-header border-b-4 border-vt-red">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Viettel_logo_2021.svg/1200px-Viettel_logo_2021.svg.png" alt="Viettel" class="h-10">
                <div>
                    <h1 class="text-xl font-bold text-vt-red uppercase leading-tight">Viettel Asset Management</h1>
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-semibold">Quản lý tài sản & Cho thuê văn phòng</p>
                </div>
            </div>
            <div class="hidden lg:block text-right text-sm">
                <p><i class="fa-solid fa-map-marker-alt text-vt-red"></i> Tầng 2, Tháp A, tòa The Light, Hà Nội</p>
                <p><i class="fa-solid fa-phone text-vt-red"></i> Hotline: 0985.990.994</p>
            </div>
        </div>
    </header>

   <section class="bg-vt-teal text-white py-20 px-4 text-center shadow-inner relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <i class="fa-solid fa-building text-[250px] absolute -bottom-10 -left-10 rotate-12"></i>
            <i class="fa-solid fa-city text-[200px] absolute -top-10 -right-10 -rotate-12"></i>
        </div>

        <div class="relative z-10 max-w-4xl mx-auto">
            <h2 class="hero-title">
                Hệ Thống Tòa Nhà <br class="hidden md:block"> Viettel Toàn Quốc
            </h2>
            <div class="hero-subtitle-box">
                <p class="hero-subtitle-text">
                    <i class="fa-solid fa-building-circle-check text-red-400 mr-2"></i>
                    Giải pháp văn phòng chuyên nghiệp cho mọi doanh nghiệp
                </p>
            </div>
        </div>
    </section>

    <div class="container mx-auto px-4 -mt-8">
        <div class="bg-white p-6 rounded-xl shadow-xl flex flex-wrap gap-4 items-center border border-gray-100">
            <input type="text" id="search" onkeyup="filterData()" placeholder="Nhập tên tỉnh hoặc tòa nhà..." class="flex-1 min-w-[250px] border-2 border-gray-100 p-3 rounded-lg focus:border-vt-teal outline-none transition-all">
            <select id="region" onchange="filterData()" class="border-2 border-gray-100 p-3 rounded-lg outline-none cursor-pointer">
                <option value="all">Tất cả khu vực</option>
                <option value="Bac">Miền Bắc</option>
                <option value="Trung">Miền Trung</option>
                <option value="Nam">Miền Nam</option>
            </select>
            <div class="text-sm font-bold text-gray-600 px-4 py-2 bg-gray-50 rounded-lg">Kết quả: <span id="count" class="text-vt-red text-lg">0</span> tòa nhà</div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-10">
        <div id="building-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <footer class="bg-gray-800 text-white py-10 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="mb-4 font-medium italic">© 2026 Viettel Asset Management - Chuyên nghiệp & Tin cậy</p>
            <div class="flex justify-center gap-8">
                <a href="#" class="hover:text-red-500 transition"><i class="fa-brands fa-facebook-f text-2xl"></i></a>
                <a href="#" class="hover:text-blue-400 transition"><i class="fa-solid fa-comment-dots text-2xl"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script>
        // Phần Script giữ nguyên như cũ của bạn
        Fancybox.bind("[data-fancybox]", {
            Images: { Panzoom: { maxScale: 3 } },
            Toolbar: { display: { right: ["zoom", "slideshow", "fullscreen", "close"] } }
        });

        const buildings = [
            { 
                tinh: "Quảng Nam", 
                ten: "Tòa nhà Viettel Quảng Nam", 
                diaChi: "Số 121 Hùng Vương, Tam Kỳ, Quảng Nam",
                trong: "345m2 - Tầng 5",
                tienIch: "PCCC chuẩn, An ninh 24/7, Bãi đỗ xe rộng, Hạ tầng VT sẵn sàng",
                nv: "Nguyễn Văn Ninh",
                sdt: "0984636158",
                region: "Trung",
                hinhAnh: [
                    "https://i.ibb.co/wrJbn2gW/z7723237916358-ef7a71b395e8a0263febc0df1f3aaa57.jpg",
                    "https://i.ibb.co/43BLcXK/z7723237924683-925909363d4bf927686a6a40456158d5.jpg",
                    "https://i.ibb.co/ksrsW34F/z7723244618548-4fd1a695efb6e80c7f97e99e374ec654.jpg",
                    "https://i.ibb.co/1fg5PNvn/z7723244638152-9e22d8e353ca0c38626747043debe0f6.jpg",
                    "https://i.ibb.co/GQWrLBkJ/z7723244655690-93d6b829f6c3aa830e0830dd79bea8e9.jpg"
                ]
            },
            { 
                tinh: "Đà Nẵng", 
                ten: "Viettel Complex Đà Nẵng", 
                diaChi: "Nguyễn Văn Linh, Đà Nẵng",
                trong: "Hết diện tích", 
                tienIch: "View sông Hàn, Điều hòa trung tâm, Thang máy tốc độ cao",
                nv: "Đinh Viết Thủy",
                sdt: "0376945999",
                region: "Trung",
                hinhAnh: ["https://scontent.fdad3-1.fna.fbcdn.net/v/t39.30808-6/514507530_10213875815166076_3935736823067271371_n.jpg?_nc_cat=108&ccb=1-7&_nc_sid=13d280&_nc_eui2=AeHOvqBm3RalUN02CjMuUccFc9esOKA6b-Fz16w4oDpv4fqaNYLAp4cNAbc-PLJOfsc&_nc_ohc=vmutfOo7M_8Q7kNvwEHmcDj&_nc_oc=Ado85gjFmrZbM9CRqYeVWv_xoxBXocc2WL3ozFgvV5J_oX9e59_ml2NojbNG7au5gk0&_nc_zt=23&_nc_ht=scontent.fdad3-1.fna&_nc_gid=0OATkdo5qkMyUqYxygQh_g&_nc_ss=7a3a8&oh=00_Af07_fapuecYEjKGNqrm1eQ5f5VA3gwVbUn7dqRxfFaZHw&oe=69E39AA7"] 
            },
            { 
                tinh: "Thừa Thiên Huế", 
                ten: "Tòa nhà Viettel Huế", 
                diaChi: "Hùng Vương, TP Huế",
                trong: "50m2 - 200m2",
                tienIch: "Gần trung tâm hành chính, Không gian yên tĩnh",
                nv: "Trương Khắc Mai",
                sdt: "0982008777",
                region: "Trung",
                hinhAnh: ["https://scontent.fdad3-1.fna.fbcdn.net/v/t39.30808-6/514317304_10213896404360793_8362935317366112487_n.jpg?_nc_cat=108&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeG8bPpvqLQB1ssS550iTWInsu3j4T0QIYSy7ePhPRAhhG-FEU3EgAQ0xxiThOD93pY&_nc_ohc=nyPCLhDvmhAQ7kNvwHHFp8t&_nc_oc=AdpZ8_ZJogaIe-1JZifhngAK80lBEPM4PAd8nUbsFCRnvjuCta50oVbHT5cEO1Q08dU&_nc_zt=23&_nc_ht=scontent.fdad3-1.fna&_nc_gid=apDXyVl1eE2XVDs28yjhVw&_nc_ss=7a3a8&oh=00_Af1fcopyEYSl_dURqdVP00DchAhuv8naUdC2-6HJUmApCQ&oe=69E386E6"]
            }
        ];

        function renderBuildings(data) {
            const grid = document.getElementById('building-grid');
            document.getElementById('count').innerText = data.length;
            grid.innerHTML = data.map((b, index) => {
                const mainImg = (b.hinhAnh && b.hinhAnh.length > 0) ? b.hinhAnh[0] : 'https://via.placeholder.com/400x300?text=Viettel+Asset';
                const galleryId = `gallery-${index}`;
                const isFull = b.trong.toLowerCase().includes("hết");
                const statusClass = isFull ? "badge-full" : "bg-vt-red";
                const cardClass = isFull ? "building-full" : "";
                let thumbnailsHtml = '';
                if (b.hinhAnh && b.hinhAnh.length > 1) {
                    thumbnailsHtml = `<div class="thumbnails-container grid grid-cols-4 gap-2 mt-3 px-6 pb-2">`;
                    for (let i = 1; i < b.hinhAnh.length; i++) {
                        thumbnailsHtml += `<a href="${b.hinhAnh[i]}" data-fancybox="${galleryId}" class="thumb-link block h-16 rounded overflow-hidden shadow-sm"><img src="${b.hinhAnh[i]}" alt="Thumbnail" class="w-full h-full object-cover"></a>`;
                    }
                    thumbnailsHtml += `</div>`;
                }
                return `
                    <div class="bg-white rounded-2xl shadow-md border overflow-hidden card-hover flex flex-col ${cardClass}">
                        <div class="main-img-link bg-gray-200 h-64 flex items-center justify-center relative cursor-pointer group">
                             <span class="absolute top-4 left-4 ${statusClass} text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase z-10 shadow-lg">${isFull ? 'Đã cho thuê' : b.tinh}</span>
                             <a href="${mainImg}" data-fancybox="${galleryId}" class="block w-full h-full relative">
                                <img src="${mainImg}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition duration-300"><i class="fa-solid fa-expand text-3xl text-white"></i></div>
                             </a>
                        </div>
                        ${thumbnailsHtml}
                        <div class="info-content p-6 pt-4 flex-1 flex flex-col">
                            <h3 class="text-xl font-bold mb-1 text-gray-800">${b.ten}</h3>
                            <p class="text-sm text-gray-500 mb-4 flex items-start gap-1"><i class="fa-solid fa-location-dot text-vt-red mt-1"></i> ${b.diaChi}</p>
                            <div class="mb-4 bg-gray-50 p-3 rounded-lg border-l-4 ${isFull ? 'border-gray-400' : 'border-vt-teal'}">
                                <p class="text-[10px] ${isFull ? 'text-gray-500' : 'text-vt-teal'} font-bold uppercase tracking-wider">Diện tích trống:</p>
                                <p class="font-bold text-gray-700">${b.trong}</p>
                            </div>
                            <div class="contact-person p-3 rounded-xl mb-5 flex items-center gap-3">
                                <div class="bg-vt-teal/10 w-11 h-11 rounded-full flex items-center justify-center text-vt-teal shadow-inner"><i class="fa-solid fa-user-tie text-lg"></i></div>
                                <div class="leading-tight">
                                    <p class="text-[10px] text-gray-400 uppercase font-bold">Phụ trách tòa nhà</p>
                                    <p class="font-bold text-gray-800 text-base">${b.nv}</p>
                                    <p class="text-sm font-bold text-vt-red phone-number">${b.sdt}</p>
                                </div>
                            </div>
                            <div class="border-t pt-4 mt-auto">
                                <div class="grid grid-cols-2 gap-3">
                                    <a href="${isFull ? '#' : 'tel:' + b.sdt}" class="${isFull ? 'bg-gray-400 cursor-not-allowed' : 'bg-vt-red hover:bg-red-700'} text-white text-center py-2.5 rounded-lg font-bold transition-all flex items-center justify-center gap-2 shadow-sm"><i class="fa-solid fa-phone-volume ${isFull ? '' : 'animate-pulse'}"></i> ${isFull ? 'Hết chỗ' : 'Gọi ngay'}</a>
                                    <a href="https://zalo.me/${b.sdt}" target="_blank" class="bg-blue-600 text-white text-center py-2.5 rounded-lg font-bold hover:bg-blue-700 transition-all flex items-center justify-center gap-2 shadow-sm"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/1200px-Icon_of_Zalo.svg.png" class="h-5 w-5"> Zalo</a>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function filterData() {
            const search = document.getElementById('search').value.toLowerCase();
            const region = document.getElementById('region').value;
            const filtered = buildings.filter(b => {
                const matchName = b.tinh.toLowerCase().includes(search) || b.ten.toLowerCase().includes(search);
                const matchRegion = region === 'all' || b.region === region;
                return matchName && matchRegion;
            });
            renderBuildings(filtered);
        }

        window.onload = () => renderBuildings(buildings);
    </script>
</body>
</html>
